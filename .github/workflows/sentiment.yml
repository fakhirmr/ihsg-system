name: News Sentiment Scan (setiap jam, jam pasar)

on:
  schedule:
    # Setiap jam dari 09:00–16:00 WIB (02:00–09:00 UTC), Senin–Jumat
    - cron: '0 2,3,4,5,6,7,8,9 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore agent cache
        uses: actions/cache@v4
        with:
          path: data/agent_cache.json
          key: ihsg-cache-${{ github.run_id }}
          restore-keys: |
            ihsg-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sentiment Scan
        env:
          LLM_PROVIDER:        ${{ secrets.LLM_PROVIDER }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_job.py --job sentiment
