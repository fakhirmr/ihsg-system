name: "Sentiment — Every Hour (Market Hours)"

on:
  schedule:
    # 09:00-15:00 WIB = 02:00-08:00 UTC, tiap jam, Senin-Jumat
    - cron: "0 2-8 * * 1-5"
  workflow_dispatch:

jobs:
  sentiment-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r ihsg_system/requirements.txt
      - name: Run Sentiment Scan
        working-directory: ihsg_system
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: auto
        run: python run_job.py --job sentiment
