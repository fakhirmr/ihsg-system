name: Technical & Volume Scan (setiap 30 menit, jam pasar)

on:
  schedule:
    # Setiap 30 menit dari 09:00–15:30 WIB (02:00–08:30 UTC), Senin–Jumat
    - cron: '0,30 2,3,4,5,6,7,8 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Technical & Volume Scan
        env:
          LLM_PROVIDER:        ${{ secrets.LLM_PROVIDER }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_job.py --job technical
