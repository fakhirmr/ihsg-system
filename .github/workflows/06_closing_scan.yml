name: "15:50 - Closing Scan (Full)"

on:
  schedule:
    # 15:50 WIB = 08:50 UTC
    - cron: "50 8 * * 1-5"
  workflow_dispatch:

jobs:
  closing-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r ihsg_system/requirements.txt
      - name: Run Full Scan (Closing)
        working-directory: ihsg_system
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: auto
        run: python run_job.py --job full_scan
