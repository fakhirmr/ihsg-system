name: "09:15 - Morning Scan (Full)"

on:
  schedule:
    # 09:15 WIB = 02:15 UTC
    - cron: "15 2 * * 1-5"
  workflow_dispatch:

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # Full scan bisa lama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r ihsg_system/requirements.txt
      - name: Run Full Scan
        working-directory: ihsg_system
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: auto
        run: python run_job.py --job full_scan
